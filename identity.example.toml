# Template for identity.toml, which holds the details Phase 3 types into
# application forms. Copy this file to identity.toml and put your real values
# there — identity.toml is gitignored, this example is committed.
#
#   copy identity.example.toml identity.toml
#
# Nothing here is secret in the password sense, but this repo is public and a
# phone number in a public repo is a phone number on the internet forever.

[personal]
first_name = "Ada"
last_name = "Lovelace"
email = "ada@example.com"
phone = "555-000-0000"
# City and state you'd put on an application, not necessarily where you live.
location = "Austin, TX"

[links]
linkedin = "https://linkedin.com/in/example"
github = "https://github.com/example"
website = ""

[education]
school = "Example State University"
degree = "Bachelor of Science"
major = "Computer Science"
# Forms ask for this in wildly different formats; keep both.
graduation_month = "May"
graduation_year = "2028"

[files]
# The PDF the tool attaches to the resume field. Keep it gitignored.
# It never attaches a cover letter: your draft is unreviewed until you edit it.
resume_pdf = "C:/Users/you/Documents/resume.pdf"

# Voluntary self-identification (EEO). Entirely optional — leave any of these
# blank and the tool leaves that question for you to answer on the form.
#
# These are only ever typed if the exact option exists on that employer's form.
# No near-matches, no substitutions: if your wording is not one of their
# choices, the field is left empty and the tool tells you so.
#
# Note what is NOT here: work authorization, sponsorship, and export-control
# questions stay manual forever. Those invert between employers ("Are you
# authorized?" vs "Will you require sponsorship?"), so one stored answer cannot
# be applied safely without reading the actual question.
[self_identification]
gender = ""
hispanic_latino = ""
veteran_status = ""
disability_status = ""
